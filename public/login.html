<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GENERAL • Login</title>
  <link rel="icon" type="image/png" href="/static/favicon.png" />
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#F5A623">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Telemetria">
  <link rel="apple-touch-icon" href="/static/icons/icon-192x192.png">
  <link rel="stylesheet" href="/static/login.css">
</head>
<body>

  <div class="login-card">

    <div class="login-logo-wrap">
      <img src="/static/login-logo.png" class="loginLogo" alt="GENERAL" />
    </div>

    <div class="login-title">
      <h1>TELEMETRIA</h1>
      <p>Sistema de monitoramento de reservatórios</p>
    </div>

    <form id="loginForm">
      <div class="login-field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="seu@email.com" required autocomplete="email" />
      </div>

      <div class="login-field">
        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="••••••••" required autocomplete="current-password" />
      </div>

      <button type="submit" class="login-btn">Entrar</button>
    </form>

    <div id="otpStep" style="display:none">
      <p class="otp-info">Enviamos um código de 6 dígitos para o seu email.<br>Verifique sua caixa de entrada.</p>
      <div class="login-field">
        <label for="otpCode">Código de verificação</label>
        <input type="text" id="otpCode" placeholder="000000" maxlength="6" inputmode="numeric" autocomplete="one-time-code" />
      </div>
      <label class="otp-trust-label">
        <input type="checkbox" id="otpConfiar" />
        Confiar neste dispositivo por 30 dias
      </label>
      <button type="button" id="otpBtn" class="login-btn">Verificar</button>
      <button type="button" id="otpBack" class="login-btn-secondary">Voltar</button>
    </div>

    <p id="erroMsg" class="erro"></p>

    <div class="login-footer">
      General Engenharia da Manutenção
    </div>

  </div>

  <script src="/static/login.js"></script>
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
