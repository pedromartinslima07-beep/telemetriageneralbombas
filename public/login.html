<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GENERAL • Login</title>
  <link rel="stylesheet" href="/static/login.css">
</head>
<body>

  <div class="login-card">

    <div class="login-logo-wrap">
      <img src="/static/login-logo.png" class="loginLogo" alt="GENERAL" />
    </div>

    <div class="login-title">
      <h1>TELEMETRIA</h1>
      <p>Sistema de monitoramento de reservatórios</p>
    </div>

    <form id="loginForm">
      <div class="login-field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="seu@email.com" required autocomplete="email" />
      </div>

      <div class="login-field">
        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="••••••••" required autocomplete="current-password" />
      </div>

      <button type="submit" class="login-btn">Entrar</button>
    </form>

    <p id="erroMsg" class="erro"></p>

    <div class="login-footer">
      General Engenharia da Manutenção
    </div>

  </div>

  <script src="/static/login.js"></script>
</body>
</html>
